version: 1
audience: recruiter_data
families:
  - jobs
domains:
  primary: linkedin.com
  region: Global
markets: 1
keyFeatures:
  - incremental
  - notifications
  - id: paste-mode
    emoji: 🔗
    title: Paste-mode
    rationale: |
      LinkedIn-specific URL parsing for job search URLs copied from the browser.
    body: |
      Paste a LinkedIn job search URL copied from your browser. The actor reads
      the URL's keywords, location, geoId, date, work type, job type, company,
      Easy Apply, and sort filters and runs that search directly.
  - id: recruiter-spam-filter
    body: |
      `removeAgency: true` runs a heuristic post-filter on company names
      (matching "recruitment", "staffing", etc.) and drops listings from
      3rd-party agencies — keep only direct-employer postings.
  - detail-enrichment
  - id: description-truncation
    emoji: ✂️
    title: Description truncation
    rationale: |
      Implemented output control for enriched descriptions.
    body: |
      Cap enriched descriptions with `descriptionMaxLength` when downstream
      systems need smaller records.
  - id: multi-region-presets
    emoji: 🌎
    title: Multi-region with presets
    rationale: |
      LinkedIn-specific: API supports country-mix via `regions` array plus
      named presets (nordic/dach/benelux/...) backed by curated country
      groupings. No equivalent on other job-board APIs in the portfolio —
      not promotable to catalog.
    body: |
      Pass `regions: ["US", "GB", "DE"]` for a custom country mix, or pick
      a preset like `"nordic"` / `"dach"` / `"benelux"` / `"uk-ireland"` /
      `"eu-27"` / `"gcc"` / `"mena"` / `"asean"` / `"latam"` /
      `"anglosphere"` for ready-made country groupings. One run, multiple
      regions, source country preserved on every record.
  - id: easy-apply
    emoji: ⚡
    title: Easy-Apply filter
    rationale: |
      LinkedIn-specific input flag (`easyApply: true`). Maps to LinkedIn's
      proprietary Easy-Apply listing type. No analog on other job boards.
    body: |
      `easyApply: true` returns only LinkedIn Easy-Apply postings — useful
      for outreach lists targeting roles that don't redirect to external
      ATS systems.
  - id: company-filtering
    emoji: 🏢
    title: Company-level filtering
    rationale: |
      LinkedIn-specific: numeric `companyId` filter at API level + name
      substring `excludeCompanies` post-filter. Other job boards don't
      expose stable company IDs in the same way; promote to catalog if
      Glassdoor/Indeed wrappers ever match the contract.
    body: |
      `companies: [123, 456]` filters at the LinkedIn API level (numeric
      `companyId`), or pass case-insensitive name substrings via
      `excludeCompanies` to drop staffing brands. Combine with
      `excludeKeywords` to scrub spam-prone titles.
  - compact
  - mcp-export
disable_auto_detect:
  - change-classification
  - contact-extraction
  - salary-data
  - structured-export
